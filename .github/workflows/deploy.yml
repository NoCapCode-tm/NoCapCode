name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Dependencies
        run: npm install

      - name: Configure Git
        run: |
          git config --global user.name "Om Vashishtha"
          git config --global user.email "143586605+omvashishtha@users.noreply.github.com"

      - name: Deploy
        env:
          CI: false
        run: |
          npm install -g npm@12.0.0
          npm run deploy



name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Dependencies
        run: npm install

      - name: Build
        env:
          CI: false
        run: npm run build

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          ci_cd_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build
          cname: nocapcode.cloud